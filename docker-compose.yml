version: "3.9"

services:
  backend:
    build: ./backend
    container_name: lan-monitor-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data/db
      - ./data/logs:/data/logs:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/stats').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: lan-monitor-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    build:
      context: .
      dockerfile: ollama.Dockerfile
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  db_data:
    driver: local
  ollama_data:
    driver: local
